<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eis-Aktion | Stattküche</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .form-section {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .file-upload {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        
        .file-upload input[type="file"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        
        .file-upload-label {
            display: block;
            padding: 12px;
            background: #f5f5f5;
            border: 2px dashed #667eea;
            border-radius: 6px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }
        
        .file-upload-label:hover {
            background: #f0f0ff;
        }
        
        .file-name {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }
        
        .file-preview {
            margin-top: 10px;
            max-width: 200px;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .file-preview img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .success-message {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
        
        .success-message.show {
            display: block;
        }
        
        .qr-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
            margin-top: 20px;
            display: none;
        }
        
        .qr-section.show {
            display: block;
        }
        
        .qr-section h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 14px;
        }
        
        #qrcode {
            display: inline-block;
            background: white;
            padding: 10px;
            border-radius: 6px;
        }
        
        .download-qr {
            margin-top: 15px;
        }
        
        .download-qr button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        .download-qr button:hover {
            background: #764ba2;
        }
        
        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        @media (max-width: 480px) {
            .container {
                border-radius: 0;
            }
            
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .form-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍦 Eis-Aktion</h1>
            <p>Stattküche Mitarbeiter*innen</p>
        </div>
        
        <div class="form-section">
            <div class="success-message" id="successMessage">
                ✓ Formular erfolgreich eingereicht!
            </div>
            
            <form id="eisForm" onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Dein Name" 
                        required
                    >
                    <div class="error-message" id="nameError"></div>
                </div>
                
                <div class="form-group">
                    <label for="standort">Standort *</label>
                    <select id="standort" name="standort" required>
                        <option value="">-- Bitte wählen --</option>
                        <option value="Münster">Münster</option>
                        <option value="Bergkamen">Bergkamen</option>
                        <option value="Lippstadt">Lippstadt</option>
                    </select>
                    <div class="error-message" id="standortError"></div>
                </div>
                
                <div class="form-group">
                    <label for="kassenbon">Kassenbon Foto hochladen *</label>
                    <div class="file-upload">
                        <input 
                            type="file" 
                            id="kassenbon" 
                            name="kassenbon" 
                            accept="image/*"
                            onchange="handleFileSelect(event)"
                            required
                        >
                        <label for="kassenbon" class="file-upload-label">
                            📷 Foto auswählen oder hier ablegen
                        </label>
                    </div>
                    <div id="fileName" class="file-name"></div>
                    <div id="filePreview" class="file-preview"></div>
                    <div class="error-message" id="fileError"></div>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    Absenden & QR-Code generieren
                </button>
            </form>
            
            <div class="qr-section" id="qrSection">
                <h3>✓ Deine Teilnahme-Bestätigung</h3>
                <div id="qrcode"></div>
                <p style="font-size: 12px; color: #666; margin-top: 10px;">
                    Speichere oder teile diesen Code
                </p>
                <div class="download-qr">
                    <button onclick="downloadQR()">QR-Code herunterladen</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let selectedFile = null;
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            const fileError = document.getElementById('fileError');
            const fileName = document.getElementById('fileName');
            const filePreview = document.getElementById('filePreview');
            
            fileError.classList.remove('show');
            
            if (!file) {
                fileName.textContent = '';
                filePreview.innerHTML = '';
                selectedFile = null;
                return;
            }
            
            if (!file.type.startsWith('image/')) {
                fileError.textContent = 'Bitte wähle ein Bild aus';
                fileError.classList.add('show');
                selectedFile = null;
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                fileError.textContent = 'Datei ist zu groß (max. 5 MB)';
                fileError.classList.add('show');
                selectedFile = null;
                return;
            }
            
            selectedFile = file;
            fileName.textContent = `✓ ${file.name}`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                filePreview.innerHTML = `<img src="${e.target.result}" alt="Vorschau">`;
            };
            reader.readAsDataURL(file);
        }
        
        function handleSubmit(event) {
            event.preventDefault();
            
            const nameInput = document.getElementById('name');
            const standortInput = document.getElementById('standort');
            const nameError = document.getElementById('nameError');
            const standortError = document.getElementById('standortError');
            const fileError = document.getElementById('fileError');
            
            nameError.classList.remove('show');
            standortError.classList.remove('show');
            fileError.classList.remove('show');
            
            let isValid = true;
            
            if (!nameInput.value.trim()) {
                nameError.textContent = 'Name ist erforderlich';
                nameError.classList.add('show');
                isValid = false;
            }
            
            if (!standortInput.value) {
                standortError.textContent = 'Standort ist erforderlich';
                standortError.classList.add('show');
                isValid = false;
            }
            
            if (!selectedFile) {
                fileError.textContent = 'Bitte lade ein Foto des Kassenbons hoch';
                fileError.classList.add('show');
                isValid = false;
            }
            
            if (!isValid) {
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Wird übertragen...';
            
            // Foto als Base64 konvertieren
            const reader = new FileReader();
            reader.onload = function(e) {
                const fotoBase64 = e.target.result;
                
                // Daten an Google Apps Script senden
                const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbzLUIEPUdHfbsrakzcIQJFCK-0ORrUoXOVkR-tWpKr1C16UvJ3thhiA_L7TFHUNs4dZwQ/exec';
                
                fetch(googleScriptUrl, {
                    method: 'POST',
                    body: new URLSearchParams({
                        name: nameInput.value.trim(),
                        standort: standortInput.value,
                        foto: fotoBase64
                    })
                })
                .then(response => response.json())
                .then(data => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Absenden & QR-Code generieren';
                    
                    if (data.success) {
                        const formData = {
                            name: nameInput.value.trim(),
                            standort: standortInput.value,
                            kassenbon: selectedFile.name,
                            timestamp: new Date().toISOString()
                        };
                        
                        document.getElementById('successMessage').classList.add('show');
                        document.getElementById('eisForm').style.display = 'none';
                        
                        // 🎉 Konfetti-Animation
                        confetti({
                            particleCount: 100,
                            spread: 70,
                            origin: { y: 0.6 }
                        });
                        
                        // Zweite Welle Konfetti
                        setTimeout(() => {
                            confetti({
                                particleCount: 50,
                                spread: 100,
                                origin: { y: 0.5 }
                            });
                        }, 200);
                        
                        generateQRCode(formData);
                        document.getElementById('qrSection').classList.add('show');
                    } else {
                        alert('Fehler beim Speichern: ' + (data.error || 'Unbekannter Fehler'));
                    }
                })
                .catch(error => {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Absenden & QR-Code generieren';
                    console.error('Error:', error);
                    alert('Fehler beim Übertragen der Daten. Bitte versuchen Sie es später erneut.');
                });
            };
            
            reader.readAsDataURL(selectedFile);
        }
        
        function generateQRCode(formData) {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            
            // URL zum Formular
            const baseUrl = window.location.href.split('?')[0];
            const qrUrl = baseUrl;
            
            window.qrcodeInstance = new QRCode(qrContainer, {
                text: qrUrl,
                width: 250,
                height: 250,
                colorDark: '#667eea',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.H
            });
        }
        
        function downloadQR() {
            const qrCanvas = document.querySelector('#qrcode canvas');
            if (qrCanvas) {
                const link = document.createElement('a');
                link.href = qrCanvas.toDataURL();
                link.download = `Eis-Aktion-Bestätigung-${new Date().toISOString().split('T')[0]}.png`;
                link.click();
            }
        }
        
        // Drag & Drop für Datei-Upload
        const fileUpload = document.querySelector('.file-upload');
        const fileInput = document.getElementById('kassenbon');
        
        fileUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            fileUpload.style.opacity = '0.7';
        });
        
        fileUpload.addEventListener('dragleave', () => {
            fileUpload.style.opacity = '1';
        });
        
        fileUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            fileUpload.style.opacity = '1';
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect({ target: { files: files } });
            }
        });
    </script>
</body>
</html>
